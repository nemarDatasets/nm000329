methodology: Participants completed one session with 7 runs of 72 trials each. Run 1 was calibration (no feedback, no distraction).
  Runs 2-7 included auditory feedback and one of six distraction conditions. Auditory cues indicated left or right hand imagery.
  Trial duration was 4.5 s with 2.5 s ITI. Online classification used CSP with LDA. EEG recorded at 1000 Hz with 63 channels,
  nose reference, using two BrainAmp amplifiers.
