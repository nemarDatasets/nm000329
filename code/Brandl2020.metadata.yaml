abstract: We present an open-access dataset of a motor imagery brain-computer interface (BCI) experiment conducted under six
  different distraction conditions. Sixteen healthy participants performed left vs. right hand motor imagery while being distracted
  by flickering video, number search tasks, news listening, eyes closed, vibro-tactile stimulation, or no distraction. Each
  participant completed one calibration run without feedback and six feedback runs under the different distraction conditions,
  resulting in 504 trials per subject.
